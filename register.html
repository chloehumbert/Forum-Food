<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookime — Créer un compte</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<header>
  <div class="header-inner">
    <a href="/" class="site-logo">
      <span class="jp-title">Cookime</span>
      <span class="fr-subtitle">Forum de partage de recettes</span>
    </a>
    <div class="header-stamp">
      <span>☀</span>
      <span>nippon</span>
    </div>
  </div>
</header>

<nav>
  <ul>
    <li><a href="/">Accueil</a></li>
    <li><a href="/login">Connexion</a></li>
  </ul>
</nav>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-card-top">
      <div class="login-avatar-ring"><span></span></div>
      <h1 class="login-title">
        <span class="login-title-jp">登録</span>
        <span class="login-title-fr">Créer un compte</span>
      </h1>
    </div>

    <div class="login-alert login-alert--error" id="alertError" style="display:none">
      <span class="alert-icon">⚠</span>
      <span id="alertMsg">Une erreur est survenue, vérifiez le formulaire.</span>
    </div>

    <form class="login-form" method="POST" action="/register" novalidate>
      <div class="field-group">
        <label for="email" class="field-label">
          <span class="field-label-jp">メール</span>
          Adresse e-mail
        </label>
        <div class="field-wrap">
          <span class="field-icon">✉</span>
          <input type="email" id="email" name="email" class="field-input" placeholder="vous@exemple.com" autocomplete="email" required>
        </div>
      </div>

      <div class="field-group">
        <label for="password" class="field-label">
          <span class="field-label-jp">パスワード</span>
          Mot de passe
        </label>
        <div class="field-wrap">
          <span class="field-icon">🔑</span>
          <input type="password" id="password" name="password" class="field-input" placeholder="••••••••" autocomplete="new-password" required>
        </div>
      </div>

      <div class="field-group">
        <label for="confirm" class="field-label">
          <span class="field-label-jp">確認</span>
          Confirmation du mot de passe
        </label>
        <div class="field-wrap">
          <span class="field-icon">🔁</span>
          <input type="password" id="confirm" name="confirm" class="field-input" placeholder="••••••••" autocomplete="new-password" required>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btnRegister">
        <span class="btn-login-text">Créer un compte</span>
      </button>
    </form>

    <div class="login-sep">
      <span></span>
      <span class="sep-text">ou</span>
      <span></span>
    </div>

    <p class="register-link">
      Déjà inscrit ?
      <a href="/login">Se connecter</a>
    </p>

    <a href="/" class="back-link">← Retour au forum</a>
  </div>
</div>

<footer>
  <span class="footer-jp">Cookime</span>
  &copy; 2025 Cookime — Tous droits réservés
</footer>

</body>
</html>
